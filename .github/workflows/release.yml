name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: llm-dash
            asset_name: llm-dash-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: llm-dash.exe
            asset_name: llm-dash-windows-x86_64.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: llm-dash
            asset_name: llm-dash-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: llm-dash
            asset_name: llm-dash-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} \
             ${{ matrix.asset_name }}

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          draft: false
          prerelease: false
